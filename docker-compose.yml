version: "3.8"

services:
  localstack:
    container_name: localstack_dev
    image: localstack/localstack:latest
    ports:
      - "4566:4566"            
    environment:
      - SERVICES=s3            
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"